update_km:
  name: Actualizează kilometraj
  description: Actualizează kilometrajul curent al mașinii
  fields:
    entry_id:
      name: ID integrare
      description: entry_id-ul integrării (opțional dacă ai o singură mașină)
      required: false
      selector:
        text:
    km:
      name: Kilometraj
      description: Kilometrajul curent
      required: true
      selector:
        number:
          min: 0
          max: 1000000
          unit_of_measurement: "km"

